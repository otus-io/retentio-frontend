---
name: retentio
description: "A Retentio project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'
  flutter: '>=3.24.3'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  dio: ^5.9.2
  flutter_riverpod: ^3.2.1
  collection: ^1.19.1
  shared_preferences: ^2.5.4
  logger: ^2.6.2
  meta: ^1.17.0
  riverpod: ^3.2.1
  lucide_icons_flutter: ^3.1.10
  hive_ce: ^2.19.3
  path_provider: ^2.1.5
  synchronized: ^3.4.0
  go_router: ^17.1.0
  flutter_expandable_fab: ^2.5.2
  pull_to_refresh: ^2.0.0
  pull_down_button: ^0.10.2
  equatable: ^2.0.8
  extended_image: ^10.0.1
  path: ^1.9.1
  just_audio: ^0.10.5
  audio_waveforms: ^2.0.2
  video_player: ^2.9.1
  connectivity_plus: ^7.0.0
  file_picker: ^8.3.7
  image_picker: ^1.1.2
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# path_provider_foundation 2.6.0+ uses package:objective_c (native assets). That can
# fail on iOS with missing SdkRoot during tooling and missing objective_c.framework in
# the app bundle. 2.5.1 keeps the classic plugin implementation until Flutter embeds
# native assets reliably (see flutter/flutter#180603).
dependency_overrides:
  path_provider_foundation: 2.5.1

flutter:
  uses-material-design: true
  generate: true
