---
# Automated PR review via Claude Code (anthropics/claude-code-action).
# Requires: ANTHROPIC_API_KEY repository secret and the Claude GitHub App
# (https://github.com/apps/claude) or /install-github-app from Claude Code.
name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: claude-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this Flutter mobile app pull request. Focus on:
            - Logic errors, async/state bugs, and widget lifecycle issues
            - Security (auth token storage, API input validation)
            - Riverpod usage (ref.watch vs ref.read, provider placement)
            - API calls through services/apis/ — not directly from widgets
            - i18n: user-visible strings in both app_en.arb and app_zh.arb
            - Shared UI: AppButton, AppInput, AppIconButton (not raw Material widgets in screen/)
            - Test coverage for behavior changes

            Skip lockfiles, generated l10n, and build artifacts.
            Follow docs/contributing.md and .cursor/rules when applicable.

            The PR branch is already checked out in the working directory.

            Start the top-level summary with "## 🤖 Claude Code Review".
            Use `gh pr comment` for the summary.
            Use `mcp__github_inline_comment__create_inline_comment` (with `confirmed: true`) only for real bugs — not style or naming nits.
            Do not submit a formal APPROVE or REQUEST CHANGES review event.
          claude_args: |
            --max-turns 10
            --allowedTools "Read,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),mcp__github_inline_comment__create_inline_comment"
