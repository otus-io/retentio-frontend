---
name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - 'lib/**'
      - 'test/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'analysis_options.yaml'
      - 'devtools_options.yaml'
      - 'l10n.yaml'
      - 'android/**'
      - 'ios/**'
      - 'web/**'
      - 'linux/**'
      - 'windows/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'lib/**'
      - 'test/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'analysis_options.yaml'
      - 'devtools_options.yaml'
      - 'l10n.yaml'
      - 'android/**'
      - 'ios/**'
      - 'web/**'
      - 'linux/**'
      - 'windows/**'
      - '.github/workflows/frontend.yml'

jobs:
  lint-and-analyze:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed lib/

      - name: Analyze code
        run: flutter analyze

      - name: Run tests
        run: flutter test
